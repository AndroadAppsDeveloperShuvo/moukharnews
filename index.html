<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিউজ ব্যানার জেনারেটর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Bangla&display=swap');
        body { font-family: 'Tiro Bangla', serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-2xl bg-gray-800 rounded-xl shadow-2xl p-6 mt-8 border border-gray-700">
        <h2 class="text-3xl font-bold text-center mb-6 text-red-500">ব্যানার তৈরি করুন</h2>

        <div id="errorAlert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <strong class="font-bold">সতর্কতা!</strong>
            <span class="block sm:inline"> frame.png ছবিটি লোড হয়নি। দয়া করে গিটহাবে ফাইলের নাম ও লোকেশন চেক করুন।</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1">ছবি আপলোড করুন</label>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-red-600 file:text-white hover:file:bg-red-700 cursor-pointer">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1">প্রধান শিরোনাম (Headline)</label>
                <input type="text" id="headline" value="আজ চিরনিদ্রায় শায়িত হবেন খামেনি" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1">তারিখ</label>
                <input type="text" id="dateText" value="৯ জুলাই ২০২৬" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>
        </div>

        <div class="mb-6 flex justify-center w-full overflow-hidden">
            <canvas id="bannerCanvas" width="1080" height="960" class="w-full max-w-full h-auto bg-gray-700 rounded-md shadow-lg border border-gray-600"></canvas>
        </div>

        <button id="downloadBtn" class="w-full bg-red-600 hover:bg-red-700 text-white text-lg font-bold py-3 px-4 rounded-md transition duration-300 shadow-lg">
            ব্যানার ডাউনলোড করুন
        </button>
    </div>

    <script>
        const canvas = document.getElementById('bannerCanvas');
        const ctx = canvas.getContext('2d');
        
        const imageUpload = document.getElementById('imageUpload');
        const headlineInput = document.getElementById('headline');
        const dateInput = document.getElementById('dateText');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorAlert = document.getElementById('errorAlert');

        let uploadedImage = new Image();
        let frameImage = new Image();
        
        // CORS পলিসি বাইপাস করার জন্য (Vercel-এ অনেক সময় প্রয়োজন হয়)
        frameImage.crossOrigin = "anonymous";
        
        // রিলেটিভ পাথ ব্যবহার করা হয়েছে
        frameImage.src = './frame.png'; 

        // ফ্রেম লোড না হলে এরর দেখাবে
        frameImage.onerror = function() {
            errorAlert.classList.remove('hidden');
            // ডিফল্ট ব্যাকগ্রাউন্ড দিয়ে ক্যানভাস ফিল করে রাখা
            ctx.fillStyle = "#374151";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "30px sans-serif";
            ctx.fillText("Frame Image Missing!", canvas.width / 2, canvas.height / 2);
        };

        function drawCanvas() {
            // যদি ফ্রেম লোড না হয়ে থাকে, তাহলে কিছু আঁকবে না
            if (!frameImage.complete || frameImage.naturalWidth === 0) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. প্রথমে ফ্রেম আঁকবে
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

            // 2. ইউজারের ছবি আঁকবে (ক্লিপিং করে ধূসর অংশে)
            if (uploadedImage.src) {
                const boxX = 40;
                const boxY = 40;
                const boxW = 1000;
                const boxH = 635;

                const imgRatio = uploadedImage.width / uploadedImage.height;
                const boxRatio = boxW / boxH;
                let drawW, drawH, drawX, drawY;

                if (imgRatio > boxRatio) {
                    drawH = boxH;
                    drawW = uploadedImage.width * (boxH / uploadedImage.height);
                    drawX = boxX - (drawW - boxW) / 2;
                    drawY = boxY;
                } else {
                    drawW = boxW;
                    drawH = uploadedImage.height * (boxW / uploadedImage.width);
                    drawX = boxX;
                    drawY = boxY - (drawH - boxH) / 2;
                }

                ctx.save();
                ctx.beginPath();
                ctx.rect(boxX, boxY, boxW, boxH);
                ctx.clip();
                ctx.drawImage(uploadedImage, drawX, drawY, drawW, drawH);
                ctx.restore();
            }

            // 3. হেডলাইন
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 65px 'Tiro Bangla', sans-serif"; 
            ctx.fillText(headlineInput.value, canvas.width / 2, 810); 

            // 4. তারিখ
            ctx.textAlign = "right";
            ctx.font = "35px 'Tiro Bangla', sans-serif";
            ctx.fillText(dateInput.value, canvas.width - 60, 880); 
        }

        // ফ্রেম সঠিকভাবে লোড হলে ক্যানভাস আপডেট করবে
        frameImage.onload = () => {
            errorAlert.classList.add('hidden'); // এরর মেসেজ হাইড করবে
            drawCanvas();
        };
        
        // ছবি আপলোড হ্যান্ডেলিং
        imageUpload.addEventListener('change', (e) => {
            if(e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    uploadedImage.src = event.target.result;
                    uploadedImage.onload = drawCanvas;
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // লাইভ টেক্সট প্রিভিউ
        headlineInput.addEventListener('input', drawCanvas);
        dateInput.addEventListener('input', drawCanvas);

        // ডাউনলোড বাটন ফাংশন
        downloadBtn.addEventListener('click', () => {
            try {
                const link = document.createElement('a');
                link.download = 'news-banner-final.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert("ডাউনলোড করার সময় সমস্যা হয়েছে। ব্রাউজারের সিকিউরিটি (CORS) ইস্যু হতে পারে।");
                console.error(err);
            }
        });

        // ফন্ট লোড হওয়ার জন্য একটু সময় দেওয়া
        setTimeout(drawCanvas, 1000);
    </script>
</body>
</html>
