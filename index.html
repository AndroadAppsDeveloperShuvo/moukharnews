<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিউজ ব্যানার জেনারেটর</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap');
        body { font-family: 'Tiro Bangla', serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-3xl bg-gray-800 rounded-xl shadow-2xl p-6 mt-4 border border-gray-700">
        <h2 class="text-3xl font-bold text-center mb-6 text-red-500">ব্যানার তৈরি করুন</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1 text-gray-300">ছবি আপলোড করুন (মেসি বা অন্য কারও)</label>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-red-600 file:text-white hover:file:bg-red-700 cursor-pointer transition">
            </div>
            
            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1 text-gray-300">প্রধান শিরোনাম (Headline)</label>
                <input type="text" id="headline" value="ফিফা কে কিনে নিলো মেসি" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500 text-lg">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium mb-1 text-gray-300">তারিখ</label>
                <input type="text" id="dateText" value="৯ জুলাই ২০২৬" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500 text-lg">
            </div>
        </div>

        <div class="mb-6 flex justify-center w-full overflow-hidden bg-gray-900 rounded-lg border border-gray-700 p-2">
            <canvas id="bannerCanvas" class="w-full max-w-full h-auto shadow-md"></canvas>
        </div>

        <button id="downloadBtn" class="w-full bg-red-600 hover:bg-red-700 text-white text-xl font-bold py-3 px-4 rounded-md transition duration-300 shadow-lg">
            ব্যানার ডাউনলোড করুন
        </button>
    </div>

    <script>
        const canvas = document.getElementById('bannerCanvas');
        const ctx = canvas.getContext('2d');
        
        const imageUpload = document.getElementById('imageUpload');
        const headlineInput = document.getElementById('headline');
        const dateInput = document.getElementById('dateText');
        const downloadBtn = document.getElementById('downloadBtn');

        let uploadedImage = new Image();
        let frameImage = new Image();
        
        frameImage.crossOrigin = "anonymous";
        // আপনার ফ্রেমের ফাইলের নাম
        frameImage.src = './IMG_2220.jpeg'; 

        function drawCanvas() {
            if (!frameImage.complete || frameImage.naturalWidth === 0) return;

            // ক্যানভাসের সাইজ ফ্রেমের আসল সাইজের সমান করা হলো (যাতে ছবি না ফাটে বা চ্যাপ্টা না হয়)
            canvas.width = frameImage.naturalWidth;
            canvas.height = frameImage.naturalHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ১. প্রথমে ব্যাকগ্রাউন্ডে ফ্রেম বসানো হলো
            ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);

            // ২. আপলোড করা ছবি ধূসর বক্সে বসানো
            if (uploadedImage.src && uploadedImage.complete) {
                // ফ্রেমের সাইজ অনুযায়ী ধূসর বক্সের মাপ বের করা (Dynamic Percentages)
                const boxX = canvas.width * 0.015;  // বাম দিক থেকে ১.৫% জায়গা ছাড়বে
                const boxY = canvas.height * 0.015; // ওপর থেকে ১.৫% জায়গা ছাড়বে
                const boxW = canvas.width * 0.97;   // চওড়ায় ৯৭% জায়গা নেবে
                const boxH = canvas.height * 0.72;  // লম্বায় ৭২% জায়গা নেবে (লাল বক্সের ওপর পর্যন্ত)

                const imgRatio = uploadedImage.width / uploadedImage.height;
                const boxRatio = boxW / boxH;
                let drawW, drawH, drawX, drawY;

                // ছবি যেন রেশিও ঠিক রেখে বক্স কভার করে (Object-fit: cover)
                if (imgRatio > boxRatio) {
                    drawH = boxH;
                    drawW = uploadedImage.width * (boxH / uploadedImage.height);
                    drawX = boxX - (drawW - boxW) / 2;
                    drawY = boxY;
                } else {
                    drawW = boxW;
                    drawH = uploadedImage.height * (boxW / uploadedImage.width);
                    drawX = boxX;
                    drawY = boxY - (drawH - boxH) / 2;
                }

                ctx.save();
                ctx.beginPath();
                ctx.rect(boxX, boxY, boxW, boxH);
                ctx.clip(); // এই কোডের কারণে ছবি ধূসর বক্সের বাইরে যাবে না
                ctx.drawImage(uploadedImage, drawX, drawY, drawW, drawH);
                ctx.restore();
            }

            // ৩. হেডলাইন লেখা (ডায়নামিক ফন্ট সাইজ ও পজিশন)
            const headlineFontSize = Math.floor(canvas.width * 0.065); // ফ্রেমের সাইজ অনুযায়ী ফন্ট বড়-ছোট হবে
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `bold ${headlineFontSize}px 'Tiro Bangla', serif`; 
            
            // লাল বক্সের মাঝ বরাবর হেডলাইন বসানো
            const headlineY = canvas.height * 0.83; 
            ctx.fillText(headlineInput.value, canvas.width / 2, headlineY); 

            // ৪. তারিখ লেখা
            const dateFontSize = Math.floor(canvas.width * 0.035);
            ctx.textAlign = "right";
            ctx.font = `${dateFontSize}px 'Tiro Bangla', serif`;
            
            // ডান দিকের নিচে তারিখ বসানো
            const dateX = canvas.width * 0.96;
            const dateY = canvas.height * 0.93;
            ctx.fillText(dateInput.value, dateX, dateY); 
        }

        frameImage.onload = drawCanvas;
        
        imageUpload.addEventListener('change', (e) => {
            if(e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    uploadedImage.src = event.target.result;
                    uploadedImage.onload = drawCanvas;
                }
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        headlineInput.addEventListener('input', drawCanvas);
        dateInput.addEventListener('input', drawCanvas);

        downloadBtn.addEventListener('click', () => {
            try {
                const link = document.createElement('a');
                link.download = 'news-banner-final.png';
                link.href = canvas.toDataURL('image/png', 1.0); // High Quality Download
                link.click();
            } catch (err) {
                alert("ডাউনলোড ফেইল হয়েছে।");
            }
        });

        // ফন্ট লোড হওয়ার জন্য একটু ডিলে
        setTimeout(drawCanvas, 1000);
    </script>
</body>
</html>
